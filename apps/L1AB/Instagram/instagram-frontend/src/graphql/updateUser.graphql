mutation UpdateUser($input: UpdateInput!, $id: ID!) {
  updateUser(input: $input, _id: $id) {
    username
    profilePicture
    gender
    fullname
    bio
  }
}

query getUserById($id: ID!) {
  getUserById(_id: $id) {
    _id
    email
    username
    fullname
    gender
    password
    profilePicture
    bio
    isPrivate
    createdAt
    updatedAt
  }
}
